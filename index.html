<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>✊ Rock Paper Scissors ✌️</h1>
    
    <div class="score">
      <div>You: <span id="player-score">0</span></div>
      <div>Computer: <span id="computer-score">0</span></div>
    </div>

    <div class="result" id="result">Choose your move!</div>

    <div class="choices">
      <button onclick="playGame('rock')">✊ Rock</button>
      <button onclick="playGame('paper')">✋ Paper</button>
      <button onclick="playGame('scissors')">✌️ Scissors</button>
    </div>

    <button class="reset" onclick="resetScore()">Reset Score</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
